# This is for STM32F411CEU6 (STM32 Nucleo-64 board)
# STM32F411CEU6: 512KB Flash, 128KB RAM
# https://www.st.com/en/microcontrollers-microprocessors/stm32f411ce.html

source [find interface/stlink.cfg]

transport select hla_swd

# STM32F411 specific configuration
set WORKAREASIZE 0x8000
source [find target/stm32f4x.cfg]

# Reset configuration for STM32F411
reset_config srst_only

# Additional STM32F411 specific settings
$_TARGETNAME configure -rtos auto

# Enable semihosting support (optional)
# arm semihosting enable
